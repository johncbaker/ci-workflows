name: Promote Tag (reusable)

on:
  workflow_call:
    inputs:
      target-branch:
        description: Branch to force-push the tagged commit to.
        type: string
        default: production
      runs-on:
        description: 'Runner label(s) as JSON-encoded string. Single: ''"ubuntu-latest"''. Array: ''["self-hosted","Linux"]''.'
        type: string
        default: '["self-hosted","Linux"]'

jobs:
  promote:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    permissions:
      contents: write
    steps:
      - name: Reset workspace (handle root-owned leftovers on self-hosted)
        shell: bash
        run: |
          if [ ! -d "$GITHUB_WORKSPACE" ] || [ -z "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ]; then
            exit 0
          fi
          rm -rf "$GITHUB_WORKSPACE"/..?* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/* 2>/dev/null || true
          if [ -n "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ] && command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo rm -rf "$GITHUB_WORKSPACE"/..?* "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/* 2>/dev/null || true
          fi
          if [ -n "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ] && command -v docker >/dev/null 2>&1; then
            docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine:3 \
              sh -c 'rm -rf /ws/..?* /ws/.[!.]* /ws/* 2>/dev/null || true'
          fi
          if [ -n "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ]; then
            echo "::warning::workspace not fully reset"
            ls -la "$GITHUB_WORKSPACE"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote tag to target branch
        env:
          TARGET_BRANCH: ${{ inputs.target-branch }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git push --force origin "${GITHUB_SHA}:refs/heads/${TARGET_BRANCH}"
